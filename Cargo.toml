[package]
name = "dat-cms"
version = "4.0.1"
edition = "2024"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1

[dependencies]
axum = { version = "0.8.9", features = ["macros", "ws", "json", "multipart"] }
tower = { version = "0.5.3" }
tower-http = { version = "0.6.11", features = ["catch-panic"] }
tokio = { version = "1.52.3", features = ["full"] }
tokio-cron-scheduler = { version = "0.15.1" }
serde = { version = "1.0.228", features = ["derive"] }
tracing = { version = "0.1.44" }
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "json", "time"] }
tracing-appender = { version = "0.2.5" }
sea-orm = { version = "2.0.0-rc.38", features = ["sqlx-all", "with-ipnetwork", "runtime-tokio-rustls", "macros"]}

dat = { version = "4.0.1" }
